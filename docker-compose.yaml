version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      # Automatically use the API .env file if it exists
      - apps/api/.env
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      # Automatically use the Web .env file if it exists
      - apps/web/.env
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - PORT=4000
